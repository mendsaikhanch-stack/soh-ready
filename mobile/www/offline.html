<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Хотол — Холболт алга</title>
  <style>
    :root { --navy: #152a5e; --blue: #2563eb; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, "Segoe UI", Roboto, system-ui, sans-serif;
      background: #ffffff;
      color: var(--navy);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .wrap { max-width: 340px; width: 100%; }
    img.logo { width: 132px; height: auto; margin: 0 auto 28px; display: block; }
    h1 { font-size: 20px; font-weight: 700; margin: 0 0 10px; }
    p { font-size: 15px; line-height: 1.55; color: #475569; margin: 0 0 28px; }
    button {
      appearance: none; border: 0; cursor: pointer;
      background: var(--blue); color: #fff;
      font-size: 16px; font-weight: 600;
      padding: 14px 28px; border-radius: 14px;
      width: 100%;
    }
    button:active { opacity: .85; }
    .hint { margin-top: 18px; font-size: 12px; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="wrap">
    <img class="logo" src="logo.png" alt="Хотол" />
    <h1>Интернэт холболт алга</h1>
    <p>Хотол ачаалахын тулд интернэт холболт шаардлагатай. Холболтоо шалгаад дахин оролдоно уу.</p>
    <button onclick="window.location.href='https://www.khotol.com'">Дахин оролдох</button>
    <div class="hint">www.khotol.com</div>
  </div>
</body>
</html>
